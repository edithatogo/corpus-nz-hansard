name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-2025-vs2026
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv==0.11.8

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements/dev.txt

      - name: UV lock check
        run: uv lock --check

      - name: UV frozen sync
        run: uv sync --frozen --all-groups

      - name: Install actionlint
        shell: pwsh
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "6e7241b51e6817ea6a047693d8e6fed13b31819c9a0dd6c5a726e1592d22f6e9"
        run: |
          $toolDir = Join-Path $env:RUNNER_TEMP "actionlint"
          New-Item -ItemType Directory -Path $toolDir -Force | Out-Null
          $zip = Join-Path $toolDir "actionlint.zip"
          $url = "https://github.com/rhysd/actionlint/releases/download/v$env:ACTIONLINT_VERSION/actionlint_$($env:ACTIONLINT_VERSION)_windows_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          if ($actual -ne $env:ACTIONLINT_SHA256) {
            throw "actionlint checksum mismatch: $actual"
          }
          Expand-Archive -LiteralPath $zip -DestinationPath $toolDir -Force
          Add-Content -Path $env:GITHUB_PATH -Value $toolDir

      - name: Ruff lint
        run: python -m ruff check --no-cache .

      - name: Ruff format
        run: python -m ruff format --check --no-cache .

      - name: Ty type check
        run: ty check --error all .

      - name: Typos
        run: typos --config typos.toml

      - name: Zizmor workflow audit
        run: zizmor --min-severity medium .github/workflows

      - name: Taplo TOML format
        run: taplo format --check pyproject.toml typos.toml

      - name: Actionlint workflow syntax
        run: actionlint -color

      - name: Quality gate configuration
        run: python scripts\check_quality_gate.py

      - name: Release provenance policy
        run: python scripts\check_release_provenance_policy.py

      - name: Release version consistency
        run: python scripts\check_release_version_consistency.py

      - name: Public surface audit
        run: python scripts\check_public_surface_audit.py

      - name: Zenodo rights metadata
        run: python scripts\check_zenodo_rights_metadata.py

      - name: Shared NZ corpus core schema
        run: python scripts\check_shared_core_schema.py

      - name: SOTA metadata packages
        run: python scripts\check_metadata_packages.py

      - name: OSF optional mirror policy
        run: python scripts\check_osf_optional_mirror_policy.py

      - name: Corpus family publication alignment
        run: python scripts\check_corpus_family_alignment.py

      - name: Corpus family engineering alignment
        run: python scripts\check_corpus_family_engineering_alignment.py

      - name: Authority source discovery
        run: python scripts\check_authority_sources.py

      - name: Historical coverage audit
        run: python scripts\check_historical_coverage_audit.py

      - name: Release ladder
        run: python scripts\check_release_ladder.py

      - name: Gold evaluation datasets
        run: python scripts\check_gold_evaluation_datasets.py

      - name: Canonical ID and URI policy
        run: python scripts\check_canonical_id_uri_policy.py

      - name: Dependency extras policy
        run: python scripts\check_dependency_extras_policy.py

      - name: NZ parliamentary procedure model
        run: python scripts\check_nz_parliamentary_procedure_model.py

      - name: Neutral parliamentary component model
        run: python scripts\check_neutral_component_model.py

      - name: ParlaMint-NZ endpoint
        run: python scripts\check_parlamint_nz_endpoint.py

      - name: Popolo Open Civic Data endpoint
        run: python scripts\check_popolo_opencivicdata_endpoint.py
