name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-2025-vs2026
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements/dev.txt

      - name: Ruff lint
        run: python -m ruff check --no-cache .

      - name: Ruff format
        run: python -m ruff format --check --no-cache .

      - name: Typos
        run: typos --config typos.toml

      - name: Zizmor workflow audit
        run: zizmor --min-severity medium .github/workflows

      - name: Taplo TOML format
        run: taplo format --check pyproject.toml typos.toml
