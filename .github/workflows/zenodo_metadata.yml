name: Zenodo Metadata Sync

on:
  workflow_dispatch:
    inputs:
      deposition_id:
        description: "Published Zenodo deposition/record id"
        required: true
        default: "20595194"
      zenodo_api_url:
        description: "Zenodo API URL"
        required: true
        default: "https://zenodo.org/api"
jobs:
  sync:
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install requests
      - name: Update Zenodo metadata
        shell: pwsh
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_DEPOSITION_ID: ${{ inputs.deposition_id }}
          ZENODO_API_URL: ${{ inputs.zenodo_api_url }}
        run: |
          if (-not "$env:ZENODO_TOKEN") {
            throw "ZENODO_TOKEN secret is required."
          }
          $args = @(
            "scripts\update_zenodo_metadata.py",
            "--deposition-id", "$env:ZENODO_DEPOSITION_ID",
            "--api-url", "$env:ZENODO_API_URL"
          )
          python @args
