name: Zenodo Archive Draft Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Archive version"
        required: true
        default: "0.1.0"
      upload_to_zenodo:
        description: "Upload archive files to a Zenodo draft"
        required: true
        default: "false"
      existing_deposition_id:
        description: "Existing published Zenodo deposition/record id to version from"
        required: false
        default: "20591997"
      create_new_version:
        description: "Create a new version draft from existing_deposition_id"
        required: true
        default: "false"
      zenodo_api_url:
        description: "Zenodo API URL"
        required: true
        default: "https://zenodo.org/api"

jobs:
  archive:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Check source archive URL
        shell: pwsh
        run: |
          if (-not "${{ secrets.SOURCE_ARCHIVE_URL }}") {
            throw "SOURCE_ARCHIVE_URL secret is required because the source ZIP is not committed to Git."
          }
      - name: Download source archive
        env:
          SOURCE_ARCHIVE_URL: ${{ secrets.SOURCE_ARCHIVE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts\fetch_source_archive.py
      - name: Rebuild Parquet
        run: |
          python scripts\inventory_archive.py --archive "2024-09-06 Hansard Extract from DocumentsDB.zip" --output manifests\source_inventory.json
          python scripts\discover_schema.py --archive "2024-09-06 Hansard Extract from DocumentsDB.zip" --output manifests\schema_discovery.json --sample-rows 5
          python scripts\normalize_hansard.py --archive "2024-09-06 Hansard Extract from DocumentsDB.zip" --output-dir generated\parquet --manifest manifests\normalization_manifest.json --validation manifests\normalization_validation.json --batch-size 1000
          python scripts\validate_hansard_records.py --parquet generated\parquet\hansard.parquet --schema schemas\hansard_record.schema.json --report manifests\record_schema_validation.json
      - name: Build Zenodo archive
        run: python scripts\build_zenodo_archive.py --output-dir generated\zenodo --version "${{ inputs.version }}"
      - name: Upload Zenodo draft
        if: ${{ inputs.upload_to_zenodo == 'true' }}
        shell: pwsh
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ARCHIVE_CREATORS_JSON: ${{ secrets.ARCHIVE_CREATORS_JSON }}
          ZENODO_DEPOSITION_ID: ${{ inputs.existing_deposition_id }}
          ZENODO_API_URL: ${{ inputs.zenodo_api_url }}
        run: |
          if (-not "$env:ZENODO_TOKEN") {
            throw "ZENODO_TOKEN secret is required when upload_to_zenodo is true."
          }
          if (-not "$env:ARCHIVE_CREATORS_JSON") {
            throw "ARCHIVE_CREATORS_JSON secret is required when upload_to_zenodo is true."
          }
          $args = @(
            "scripts\upload_zenodo_archive.py",
            "--archive", "generated\zenodo\nz-hansard-corpus-${{ inputs.version }}.tar.gz",
            "--manifest", "generated\zenodo\nz-hansard-corpus-${{ inputs.version }}.manifest.json",
            "--api-url", "$env:ZENODO_API_URL",
            "--version", "${{ inputs.version }}"
          )
          if ("${{ inputs.existing_deposition_id }}") {
            $args += @("--deposition-id", "${{ inputs.existing_deposition_id }}")
          }
          if ("${{ inputs.create_new_version }}" -eq "true") {
            $args += "--create-new-version"
          }
          python @args
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: nz-hansard-zenodo-archive-${{ inputs.version }}
          path: |
            generated/zenodo/*.tar.gz
            generated/zenodo/*.manifest.json
          if-no-files-found: error
