name: Publication Readiness

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publication target to check"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - huggingface
          - zenodo

jobs:
  readiness:
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      # actions/setup-python v6.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Check publication inputs
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SOURCE_ARCHIVE_URL: ${{ secrets.SOURCE_ARCHIVE_URL }}
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ARCHIVE_CREATORS_JSON: ${{ secrets.ARCHIVE_CREATORS_JSON }}
        run: |
          if ("${{ inputs.target }}" -eq "all") {
            python scripts\check_publication_readiness.py
          } else {
            python scripts\check_publication_readiness.py --target "${{ inputs.target }}"
          }
