name: Zenodo Publish Protected

on:
  workflow_dispatch:
    inputs:
      deposition_id:
        description: "Prepared Zenodo draft deposition id to publish"
        required: true
      zenodo_api_url:
        description: "Zenodo API URL"
        required: true
        default: "https://zenodo.org/api"

jobs:
  publish:
    runs-on: windows-latest
    environment: zenodo-production-publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install requests
      - name: Publish Zenodo draft
        shell: pwsh
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_DEPOSITION_ID: ${{ inputs.deposition_id }}
          ZENODO_API_URL: ${{ inputs.zenodo_api_url }}
        run: |
          if (-not "$env:ZENODO_TOKEN") {
            throw "ZENODO_TOKEN secret is required."
          }
          python scripts\publish_zenodo_deposition.py `
            --deposition-id "$env:ZENODO_DEPOSITION_ID" `
            --api-url "$env:ZENODO_API_URL"
